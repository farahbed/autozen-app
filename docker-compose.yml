
services:
  app:
    build: .
    ports:
      - "3001:3000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    restart: always

  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: autozen
      POSTGRES_PASSWORD: supersecret123
      POSTGRES_DB: autozen
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autozen"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  db_data: