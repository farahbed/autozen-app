services:
  app:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - db
    restart: always
    command: sh -c "npx prisma migrate deploy && npm run start"

  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: autozen
      POSTGRES_PASSWORD: supersecret123
      POSTGRES_DB: autozen
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
volumes:
  db_data: