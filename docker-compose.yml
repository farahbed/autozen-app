version: "3.9"

services:
  app:
    build: .
    ports:
      - "3000:3000"   # localhost:3000 pour accéder à Next.js
    env_file:
      - .env
    depends_on:
      - db
    restart: always

  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: autozen
      POSTGRES_PASSWORD: supersecret123
      POSTGRES_DB: autozen
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data: