
services:
  app:
    build: .
    container_name: autozen-app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    restart: always
    expose:
      - "3000"

  db:
    image: postgres:16
    container_name: autozen-db
    restart: always
    environment:
      POSTGRES_USER: autozen
      POSTGRES_PASSWORD: supersecret123
      POSTGRES_DB: autozen
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autozen"]
      interval: 5s
      timeout: 5s
      retries: 5
  nginx:
    image: nginx:alpine
    container_name: autozen-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app    

volumes:
  db_data: