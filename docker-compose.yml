services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://autozen:password@db:5432/autozen
    depends_on:
      - db
    restart: always

  db:
    image: postgres:16
    container_name: autozen-db
    restart: always
    environment:
      POSTGRES_USER: autozen
      POSTGRES_PASSWORD: password
      POSTGRES_DB: autozen
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  db_data: