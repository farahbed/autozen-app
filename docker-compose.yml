version: '3.9'

services:
  app:
    build: .
    ports:
      - "3001:3000"  # accès au site sur localhost:3001
    env_file:
      - .env
    depends_on:
      - db
    restart: always

  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: autozen
      POSTGRES_PASSWORD: supersecret123
      POSTGRES_DB: autozen
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data: